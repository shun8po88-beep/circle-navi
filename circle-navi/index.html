<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千葉大ナビ|サークル・部活診断</title>
<meta name="description" content="16問でわかる、あなたに合う千葉大のサークル・部活。全団体の一覧・比較もここで。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <button class="brand" onclick="show('top')">
    <span class="brand-mark">千</span>
    <span class="brand-name">千葉大ナビ</span>
  </button>
  <nav class="header-nav">
    <button onclick="show('quiz')">診断</button>
    <button onclick="show('list')">団体一覧</button>
  </nav>
</header>

<!-- ============ トップ ============ -->
<main id="view-top" class="view">
  <section class="hero">
    <p class="hero-eyebrow">千葉大生のためのサークル・部活ナビ</p>
    <h1 class="hero-title">サークル選び、<br>もう<em>失敗</em>しない。</h1>
    <p class="hero-lead">16タイプ診断で、あなたに合う団体がわかる。<br>公認・非公認・学生団体まで、全部ここに。</p>
    <button class="btn-primary btn-big" onclick="startQuiz()">診断をはじめる<span class="btn-sub">約1分・16問</span></button>
    <button class="btn-ghost" onclick="show('list')">団体一覧から探す →</button>
  </section>
  <section class="hero-points">
    <div class="point"><strong>16タイプ</strong><span>性格で相性がわかる</span></div>
    <div class="point"><strong>費用も比較</strong><span>半期会費+合宿目安</span></div>
    <div class="point"><strong>途中入会OK</strong><span>秋からでも探せる</span></div>
  </section>
</main>

<!-- ============ 診断 ============ -->
<main id="view-quiz" class="view hidden">
  <div class="quiz-progress"><div id="quiz-bar" class="quiz-bar"></div></div>
  <div id="quiz-body"></div>
</main>

<!-- ============ 結果 ============ -->
<main id="view-result" class="view hidden">
  <section class="result-hero">
    <p class="result-eyebrow">あなたのタイプ</p>
    <h1 id="result-type" class="result-type"></h1>
    <p id="result-copy" class="result-copy"></p>
    <p id="result-axes" class="result-axes"></p>
    <p id="result-desc" class="result-desc"></p>
  </section>

  <section class="result-list-wrap">
    <h2 class="section-title">あなたに合う団体 <span id="result-count" class="count"></span></h2>
    <div class="chips" id="result-chips">
      <button class="chip active" data-kubun="all" onclick="setResultFilter(this)">すべて</button>
      <button class="chip" data-kubun="konin" onclick="setResultFilter(this)">公認のみ</button>
      <button class="chip" data-kubun="hinin" onclick="setResultFilter(this)">非公認・学生団体</button>
    </div>
    <div id="result-list" class="group-list"></div>
  </section>

  <div class="result-actions">
    <button class="btn-primary btn-big" onclick="shareStory()">結果をストーリーでシェア</button>
    <button class="btn-ghost" onclick="startQuiz()">もう一度診断する</button>
    <button class="btn-ghost" onclick="show('list')">全団体一覧を見る →</button>
  </div>
  <canvas id="share-canvas" width="1080" height="1920" class="hidden"></canvas>
</main>

<!-- ============ 全団体一覧 ============ -->
<main id="view-list" class="view hidden">
  <h1 class="page-title">団体一覧</h1>
  <input type="search" id="list-search" class="search" placeholder="団体名・活動内容で検索" oninput="renderList()">
  <div class="chips">
    <button class="chip active" data-kubun="all" onclick="setListKubun(this)">すべて</button>
    <button class="chip" data-kubun="club" onclick="setListKubun(this)">部活</button>
    <button class="chip" data-kubun="circle_k" onclick="setListKubun(this)">公認サークル</button>
    <button class="chip" data-kubun="circle_h" onclick="setListKubun(this)">非公認</button>
    <button class="chip" data-kubun="gakusei" onclick="setListKubun(this)">学生団体</button>
  </div>
  <div class="filter-row">
    <select id="f-genre" onchange="renderList()">
      <option value="all">ジャンル</option>
      <option value="運動系">運動系</option>
      <option value="音楽系">音楽系</option>
      <option value="文化系">文化系</option>
      <option value="学生団体">学生団体</option>
    </select>
    <select id="f-campus" onchange="renderList()">
      <option value="all">キャンパス</option>
      <option value="nishichiba">西千葉</option>
      <option value="inohana">亥鼻</option>
      <option value="matsudo">松戸</option>
    </select>
    <label class="check"><input type="checkbox" id="f-mid" onchange="renderList()">途中入会OK</label>
    <label class="check"><input type="checkbox" id="f-beginner" onchange="renderList()">初心者歓迎</label>
  </div>
  <p id="list-count" class="count-line"></p>
  <div id="list-body" class="group-list"></div>
</main>

<footer class="footer">
  <p>千葉大ナビ|学生運営・大学非公認のサービスです</p>
  <p class="footer-sub">掲載のご希望・情報の修正は Instagram のDMへ</p>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
